apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: server-port-ingress
spec:
  rules:
    - host: server-port.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: server-port-svc
                port:
                  number: 80
